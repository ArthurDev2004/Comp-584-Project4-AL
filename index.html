<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Calculator App</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="style.css">
 
  </head>  
  <body>
    <div class="wrapper">
        <section class="calculator-screen">
          <div class="calculator-numbers" data-current-calculation="0">
            0
          </div>
        </section>
    
        <section class="calculator-buttons"> <!--Will be the buttons of the calculator-->
            <button class="calculator-button top-row-button backspace-button">&lArr;</button>
            <button class="calculator-button top-row-button clear-button" data-value="AC" data-clicked="0">AC</button>
            <button class="calculator-button operation-button" data-value="&divide;">&divide;</button>
            <button class="calculator-button number-button" data-value="7">7</button>
            <button class="calculator-button number-button" data-value="8">8</button>
            <button class="calculator-button number-button" data-value="9">9</button>
            <button class="calculator-button operation-button" data-value="&times;">&times;</button>
            <button class="calculator-button number-button" data-value="4">4</button>
            <button class="calculator-button number-button" data-value="5">5</button>
            <button class="calculator-button number-button" data-value="6">6</button>
            <button class="calculator-button operation-button" data-value="&minus;">&minus;</button>
            <button class="calculator-button number-button" data-value="1">1</button>
            <button class="calculator-button number-button" data-value="2">2</button>
            <button class="calculator-button number-button" data-value="3">3</button>
            <button class="calculator-button operation-button" data-value="&plus;">&plus;</button>
            <button class="calculator-button number-button" id="zero-button" data-value="0">0</button>
            <button class="calculator-button equal-button" data-value="&equals;">&equals;</button>
        </section>
    </div>
  </body>
  <script src="script.js"></script>
</html>
