<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Calculator App</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="style.css">
 
  </head>  
  <body>
    <div class="wrapper">
        <section class="calculator-screen">
          <div class="calculator-numbers">

          </div>
        </section>
    
        <section class="calculator-buttons"> <!--Will be the buttons of the calculator-->
            <button class="calculator-button top-row-button">X</button>
            <button class="calculator-button top-row-button">AC</button>
            <button class="calculator-button top-row-button">%</button>
            <button class="calculator-button operation-button">&divide;</button>
            <button class="calculator-button">7</button>
            <button class="calculator-button">8</button>
            <button class="calculator-button">9</button>
            <button class="calculator-button operation-button">&times;</button>
            <button class="calculator-button">4</button>
            <button class="calculator-button">5</button>
            <button class="calculator-button">6</button>
            <button class="calculator-button operation-button">&minus;</button>
            <button class="calculator-button">1</button>
            <button class="calculator-button">2</button>
            <button class="calculator-button">3</button>
            <button class="calculator-button operation-button">&plus;</button>
            <button class="calculator-button">&plusmn;</button>
            <button class="calculator-button">0</button>
            <button class="calculator-button">.</button>
            <button class="calculator-button operation-button">&equals;</button>
        </section>
    </div>
  </body>
</html>
